<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main">
        <p class="p">0</p>
        <div class="btn">
            <button class="plus">+</button>
            <button class="minus">-</button>
        </div>
        <div class="value">
            <p>Increment/Decrement by</p>
            <input type="number" id="step">
        </div>
        <div class="reset">
            <button class="r">Reset</button>
        </div>
        <div class="key">
            <p>Keyboard shortcuts: + to increment, - to decrement, Page Up/Down to change step value </p>
        </div>
    </div>

    




    <script src="./count.js"></script>
</body>
</html>
