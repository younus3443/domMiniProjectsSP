<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="time">
        <div class="min">
            <input type="text" placeholder="0" class="m1">
            <input type="text" placeholder="0" class="m2">:
            <input type="text" placeholder="0" class="s1">
            <input type="text" placeholder="0" class="s2">
        </div>
        <div class="btns">
            <button class="start">Start</button>
            <button class="stop">Stop</button>
            <button class="reset">Reset</button>
        </div>
        
    </div>
    <script src="./script.js"></script>
</body>
</html>
