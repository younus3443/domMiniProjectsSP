<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main">
        <div class="instuctions">
            <p>I'm thinking of a number between 0 and 100.Can u guess it?</p>
        </div>
        <div class="remain">
            <p>You have <span class="span">10</span> guesses remaining</p>
        </div>
        <div class="title">
            <h5>Your guess(0-100):</h5>
            <input type="number" placeholder="Enter a number" id="num">
            <p>Enter a number netween 0 and 100</p>
        </div>
        <div class="btns">
            <button class="submit">Submit Guess</button>
            <button class="new">New Game</button>
        </div>
        <div class="msg">
            <h5><span class="current"></span></h5>
            <p>Your guesses:<span class="past"></span></p>
        </div>

    </div>
    <script src="./guess.js"></script>
</body>
</html>
