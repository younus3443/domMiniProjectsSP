<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter timer</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="main">
        <h2>Counter timer</h2>
        <div class="input">
        <input type="text" id="num1" placeholder="0">
        <input type="text" id="num2" placeholder="0">
        <span>:</span>
        <input type="text" id="num3" placeholder="0">
        <input type="text" id="num4" placeholder="0">
    </div>
    <div class="btns">
        <button class="btn b1">Start</button>
        <button class="btn b2">Stop</button>
        <button class="btn b3">Reset</button>
    </div>
    <p>Please enter a valid time in <span class="span">MM:SS</span></p>

    </div>
    

    <script src="./time.js"></script>
</body>
</html>
